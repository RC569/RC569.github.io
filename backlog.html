<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Backlog</title>
    <style>
        /* Might do something with this later.*/
        :root {
            --font-color: #E3DDDD;
            --background-color: #141414;
            --link-color: #92a8ff;
            --link-color-hover: #957fff;
        }
        .gist-meta, #user-content-betterview {
            display: none
        }
        table {
            margin-top: 1em !important;
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse
        }
        .gist .gist-data,
        body {
            background-color: var(--background-color) !important;
            color: var(--font-color) !important;
	        font-family: "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }
        th,
        tr,
        td {
            background-color: unset !important;
            border: #7d7d7d solid 1px !important;
            padding: 4px 8px !important
        }
        th {
            background-color: #1a1a1a !important
        }
        td {
            max-width: 250px;
        }
        table tr:nth-child(2n) {
            background-color: #15191a !important
        }
        .fontButtons button {
            font-size: 24px;
            background-color: #616161;
            color: var(--font-color);
            margin-right: 1em;
        }
        a {color: var(--link-color)}
        a:hover {color: var(--link-color-hover)}
        .editlink {float:right; color: var(--background-color) !important;padding-bottom:16px}
        .editlink:hover {color: var(--link-color-hover) !important;}
    </style>
</head>
<body>
    <noscript><span style="color:red;font-size:10em;font-weight:bold;">ENABLE JAVASCRIPT</span></noscript>
    <div class="fontButtons">
        <button class="sortbylengthButton" onclick="sortTableByLength()">Sort by Length</button>
        <button class="increaseButton" onclick="changeFontSize('increase')">+ Font</button>
        <button class="decreaseButton" onclick="changeFontSize('decrease')">- Font</button>
    </div>
    <script src="https://gist.github.com/RC569/4099f73cd6a46d854ddd5a01f91abd24.js"></script>
    <span>Length of everything: </span><span class="scary">¯\_ (ツ)_/¯</span>
    <a class="editlink" href="https://gist.github.com/RC569/4099f73cd6a46d854ddd5a01f91abd24/edit" target="_blank">[edit]</a>
    <script>
        const bltable = document.querySelector(".markdown-body > markdown-accessiblity-table > table");

        function changeFontSize(how) {
            if ( !bltable.style.fontSize) {
                bltable.style.fontSize="16px"
            }

            if (how === "increase") {
                newFontSize=Number(bltable.style.fontSize.replace("px", ""))+1+"px";
                bltable.style.fontSize=newFontSize;
            }
            if (how === "decrease") {
                newFontSize=Number(bltable.style.fontSize.replace("px", ""))-1+"px";
                bltable.style.fontSize=newFontSize;
            }
        }

        function horrifying() {
            const rows = bltable.querySelectorAll("tr");
            let totalSeconds = 0;

            rows.forEach(row => {
                const cells = row.querySelectorAll("td");
                if (cells.length < 4) return;

                const lengthText = cells[3].textContent.trim();

                const match = lengthText.match(/^(\d+):(\d{2}):(\d{2})$/);
                if (!match) return;

                const [, h, m, s] = match.map(Number);
                totalSeconds += h * 3600 + m * 60 + s;
            });

            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const totalLength =
                `${String(hours).padStart(2, "0")}:` +
                `${String(minutes).padStart(2, "0")}:` +
                `${String(seconds).padStart(2, "0")}`;

            lengthtxt = document.querySelector('.scary')
            lengthtxt.innerHTML = totalLength
        }
        horrifying();
        let sortMode = "initial"; // "initial" "longToShort" "shortToLong"

        const tbody = document.querySelector("tbody");

        const originalRows = Array.from(tbody.rows);

        function timeToSeconds(str) {
            const [h, m, s] = str.trim().split(":").map(Number);
            return h * 3600 + m * 60 + s;
        }

        function sortTableByLength() {
            sortMode =
                sortMode === "initial" ? "longToShort" :
                sortMode === "longToShort" ? "shortToLong" :
                "initial";

            console.log("Sort mode:", sortMode);
            const rows = Array.from(tbody.rows);

            switch (sortMode) {
                case "initial":
                    originalRows.forEach(row => tbody.appendChild(row));
                    break;

                case "longToShort":
                    rows
                        .sort((a, b) =>
                            timeToSeconds(b.cells[3].textContent) -
                            timeToSeconds(a.cells[3].textContent)
                        )
                        .forEach(row => tbody.appendChild(row));
                    break;

                case "shortToLong":
                    rows
                        .sort((a, b) =>
                            timeToSeconds(a.cells[3].textContent) -
                            timeToSeconds(b.cells[3].textContent)
                )
                .forEach(row => tbody.appendChild(row));
                break;
        }
    }
    </script>
</body>
</html>
